<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif">
  <rect x="0" y="0" width="1200" height="760" fill="#FAFAF7"/>

  <!-- Title -->
  <text x="40" y="50" font-size="30" font-weight="700" fill="#1F2A44">星合广场租房 · 通勤简图</text>
  <text x="40" y="80" font-size="15" fill="#6B7280">以时代广场站（1号线 + 8号线 换乘）为中心 · 示意图，方向大致、非按真实比例</text>

  <!-- ===== Schematic map zone ===== -->
  <!-- compass -->
  <g stroke="#9CA3AF" fill="#9CA3AF">
    <line x1="80" y1="150" x2="80" y2="118" stroke-width="2"/>
    <polygon points="80,110 75,122 85,122" stroke="none"/>
  </g>
  <text x="80" y="168" font-size="12" fill="#9CA3AF" text-anchor="middle">北 N</text>

  <!-- Line 1 (red) -->
  <line x1="180" y1="210" x2="1010" y2="210" stroke="#E60012" stroke-width="7" stroke-linecap="round"/>
  <text x="125" y="215" font-size="14" font-weight="700" fill="#E60012">1号线</text>

  <!-- Line 8 (teal) up -->
  <line x1="470" y1="210" x2="470" y2="125" stroke="#00A6A6" stroke-width="6" stroke-linecap="round"/>
  <circle cx="470" cy="138" r="6" fill="#FFFFFF" stroke="#00A6A6" stroke-width="3"/>
  <text x="486" y="132" font-size="12" fill="#00A6A6">8号线 ↑ 华池浜</text>
  <!-- Line 8 down stub -->
  <line x1="470" y1="210" x2="470" y2="258" stroke="#00A6A6" stroke-width="5" stroke-linecap="round"/>
  <polygon points="470,266 465,254 475,254" fill="#00A6A6"/>
  <text x="486" y="262" font-size="11" fill="#00A6A6">8号线 ↓ 车坊向</text>

  <!-- Line 3 dashed to Weiting (NE) -->
  <line x1="900" y1="210" x2="1058" y2="152" stroke="#7B2FBE" stroke-width="5" stroke-dasharray="9 6" stroke-linecap="round"/>
  <text x="965" y="170" font-size="10" fill="#7B2FBE">换乘</text>
  <circle cx="1062" cy="150" r="7" fill="#FFFFFF" stroke="#7B2FBE" stroke-width="3"/>
  <text x="1062" y="134" font-size="12" fill="#7B2FBE" text-anchor="end">唯亭（3号线·换乘）</text>

  <!-- Line 7 dashed to Loufeng (SW) -->
  <line x1="350" y1="210" x2="188" y2="288" stroke="#F57C00" stroke-width="5" stroke-dasharray="9 6" stroke-linecap="round"/>
  <text x="248" y="262" font-size="10" fill="#F57C00">换乘</text>
  <circle cx="182" cy="291" r="7" fill="#FFFFFF" stroke="#F57C00" stroke-width="3"/>
  <text x="182" y="312" font-size="12" fill="#F57C00" text-anchor="middle">娄葑（7号线·换乘）</text>

  <!-- Stations on line 1 -->
  <circle cx="250" cy="210" r="8" fill="#FFFFFF" stroke="#E60012" stroke-width="3"/>
  <text x="250" y="242" font-size="12" fill="#555" text-anchor="middle">湖西CBD（西）</text>

  <circle cx="610" cy="210" r="6" fill="#E60012"/>
  <text x="610" y="242" font-size="11" fill="#777" text-anchor="middle">星湖街</text>

  <circle cx="740" cy="210" r="8" fill="#FFFFFF" stroke="#E60012" stroke-width="3"/>
  <text x="740" y="242" font-size="12" fill="#555" text-anchor="middle">南施街（东）</text>

  <circle cx="900" cy="210" r="8" fill="#FFFFFF" stroke="#E60012" stroke-width="3"/>
  <text x="900" y="242" font-size="12" fill="#555" text-anchor="middle">星塘街（东）</text>

  <!-- YOU / Times Square hub -->
  <circle cx="470" cy="210" r="14" fill="#FFFFFF" stroke="#C9A227" stroke-width="3"/>
  <text x="470" y="217" font-size="18" fill="#C9A227" text-anchor="middle">★</text>
  <text x="470" y="170" font-size="14" font-weight="700" fill="#1F2A44" text-anchor="middle">时代广场 ★ 你在这</text>
  <text x="470" y="190" font-size="11" fill="#9A8400" text-anchor="middle">住这附近 = 零通勤 · 但最贵</text>

  <!-- ===== Comparison cards ===== -->
  <!-- Card A: 南施街 (orange / 中) -->
  <g>
    <rect x="30" y="350" width="216" height="262" rx="12" fill="#FFF3E0" stroke="#EF7D00" stroke-width="2"/>
    <path d="M30 362 a12 12 0 0 1 12 -12 h192 a12 12 0 0 1 12 12 v32 h-216 z" fill="#EF7D00"/>
    <text x="138" y="380" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">南施街 · 东</text>
    <text x="46" y="426" font-size="14" fill="#333">地铁：1号线 13分 ✓直达</text>
    <text x="46" y="456" font-size="14" fill="#333">翡翠国际 / 金湖湾</text>
    <text x="46" y="481" font-size="14" fill="#333">东湖大郡 / 中海华琚</text>
    <text x="46" y="516" font-size="14" fill="#333">一室 3.0–4.0k</text>
    <text x="46" y="541" font-size="14" fill="#333">两室 4.5–6.0k</text>
    <text x="46" y="578" font-size="14" font-weight="700" fill="#EF7D00">〔档位：中〕</text>
  </g>

  <!-- Card B: 星塘街 (green / 便宜·推荐) -->
  <g>
    <rect x="261" y="350" width="216" height="262" rx="12" fill="#E8F5E9" stroke="#2E9E4F" stroke-width="3"/>
    <path d="M261 362 a12 12 0 0 1 12 -12 h192 a12 12 0 0 1 12 12 v32 h-216 z" fill="#2E9E4F"/>
    <text x="369" y="380" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">★ 星塘街·东沙湖</text>
    <text x="277" y="426" font-size="14" fill="#333">地铁：1号线 16分 ✓直达</text>
    <text x="277" y="456" font-size="14" fill="#333">海悦花园（大社区）</text>
    <text x="277" y="481" font-size="14" fill="#333">中海国际 / 风华里</text>
    <text x="277" y="516" font-size="14" fill="#333">一室 2.5–3.5k</text>
    <text x="277" y="541" font-size="14" fill="#333">两室 3.8–5.0k</text>
    <text x="277" y="578" font-size="14" font-weight="700" fill="#2E9E4F">〔便宜 · 推荐〕</text>
  </g>

  <!-- Card C: 湖西CBD (red / 贵) -->
  <g>
    <rect x="492" y="350" width="216" height="262" rx="12" fill="#FFEBEE" stroke="#E53935" stroke-width="2"/>
    <path d="M492 362 a12 12 0 0 1 12 -12 h192 a12 12 0 0 1 12 12 v32 h-216 z" fill="#E53935"/>
    <text x="600" y="380" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">湖西CBD · 西</text>
    <text x="508" y="426" font-size="14" fill="#333">地铁：1号线 ~15分</text>
    <text x="508" y="456" font-size="14" fill="#333">东方之门 / 星海广场</text>
    <text x="508" y="486" font-size="14" fill="#333">租金 同价或更贵 ✗</text>
    <text x="508" y="516" font-size="14" fill="#333">过金鸡湖大桥</text>
    <text x="508" y="541" font-size="14" fill="#333">高峰更堵</text>
    <text x="508" y="578" font-size="14" font-weight="700" fill="#E53935">〔贵 · 不推荐〕</text>
  </g>

  <!-- Card D: 娄葑 (blue / 便宜·绕) -->
  <g>
    <rect x="723" y="350" width="216" height="262" rx="12" fill="#E3F2FD" stroke="#1E88E5" stroke-width="2"/>
    <path d="M723 362 a12 12 0 0 1 12 -12 h192 a12 12 0 0 1 12 12 v32 h-216 z" fill="#1E88E5"/>
    <text x="831" y="380" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">娄葑 · 西南</text>
    <text x="739" y="426" font-size="14" fill="#333">地铁：7号线 ~33分</text>
    <text x="739" y="451" font-size="13" fill="#666">需换乘 · 开车/骑行更快</text>
    <text x="739" y="481" font-size="14" fill="#333">朗琴湾 / 欧洲花园</text>
    <text x="739" y="506" font-size="14" fill="#333">通园新村 / 怡葑庭</text>
    <text x="739" y="536" font-size="14" fill="#333">一室2–3k 两室3.5–4.8k</text>
    <text x="739" y="578" font-size="14" font-weight="700" fill="#1E88E5">〔便宜 · 离CBD近但绕〕</text>
  </g>

  <!-- Card E: 唯亭 (blue / 最便宜·最远) -->
  <g>
    <rect x="954" y="350" width="216" height="262" rx="12" fill="#E3F2FD" stroke="#1E88E5" stroke-width="2"/>
    <path d="M954 362 a12 12 0 0 1 12 -12 h192 a12 12 0 0 1 12 12 v32 h-216 z" fill="#1E88E5"/>
    <text x="1062" y="380" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">唯亭 · 东北</text>
    <text x="970" y="426" font-size="14" fill="#333">地铁：3号线 ~45分</text>
    <text x="970" y="451" font-size="13" fill="#666">需换乘 · 通勤明显变长</text>
    <text x="970" y="481" font-size="14" fill="#333">青苑新村 / 夷亭村</text>
    <text x="970" y="506" font-size="14" fill="#333">畅苑新村 / 金陵花园</text>
    <text x="970" y="536" font-size="14" fill="#333">一室1.5–2.5k 两室2.8–3.8k</text>
    <text x="970" y="578" font-size="14" font-weight="700" fill="#1E88E5">〔最便宜 · 最远〕</text>
  </g>

  <!-- Footer legend -->
  <text x="40" y="660" font-size="13" fill="#555">颜色 = 租金高低：<tspan fill="#E53935" font-weight="700">红 贵</tspan> · <tspan fill="#EF7D00" font-weight="700">橙 中</tspan> · <tspan fill="#2E9E4F" font-weight="700">绿 便宜</tspan> · <tspan fill="#1E88E5" font-weight="700">蓝 最便宜但远</tspan>    |    ✓ 直达地铁   ✗ 需换乘/不划算    |    实线=直达线路  虚线=需换乘</text>
  <text x="40" y="685" font-size="13" fill="#888">时间为「门到站」含步行（非高峰）；租金为按行情估算的月租区间，实际挂牌价请在贝壳 / 安居客搜小区名核对。</text>
  <text x="40" y="725" font-size="13" font-weight="700" fill="#1F2A44">一句话：省心选 南施街(1号线13分) · 省钱选 星塘街·海悦花园(1号线16分) · 唯亭/娄葑仅在预算很紧时考虑。</text>
</svg>
